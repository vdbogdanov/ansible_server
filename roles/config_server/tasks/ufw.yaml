---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Start ufw service
  ansible.builtin.systemd_service:
    name: ufw
    state: started
    enabled: true

- name: Reset ufw
  community.general.ufw:
    state: reset

- name: Common setup ufw
  ansible.builtin.command:
    cmd: |
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 81/tcp
      ufw allow 443/tcp
      ufw allow 51820/udp

- name: Enable ufw
  community.general.ufw:
    state: enabled
